<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends Table</title>
    <style>
        table{
            border-collapse: collapse;
        }
        td, th{
            border: 1px solid black;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <main>
        <caption>My Friends info</caption>
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Name</th>
                    <th>Age</th>
                </tr>
            </thead>
                    <tbody>
            <tr>
                <td>1</td>
                <td>Rahul</td>
                <td>22</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Digonto</td>
                <td>22</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Alif (Nigga)</td>
                <td>22</td>
            </tr>

        </tbody>
        <tfoot>
            <td colspan="3">Total Friends: 4</td>
        </tfoot>
        </table>

    </main>
</body>
</html>
