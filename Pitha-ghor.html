<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pitha House</title>
    <style>
        header h2{
            text-align: center;
        }
        form .basic-info label{
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h2>Welcome to My Pitha House</h2>
        <section>
            <form action="">
                <fieldset class="basic-info">
                    <legend>fill up the info</legend>
                    <label for="name">Your name</label>
                    <input type="text" name="" id="name">

                    <label for="email">Your email</label>
                    <input type="email" name="" id="email">
                </fieldset>
                <fieldset>

                    <legend>Pitha type</legend>
                    <input type="radio" name="pitha" id="bapa">
                    <label for="bapa">Bapa pitha</label>

                    <input type="radio" name="pitha" id="sutki">
                    <label for="sutki">Sutki pitha</label>
                    
                </fieldset>
                <fieldset>
                    <legend>Bortha Selection</legend>

                    <input type="checkbox" name="" id="sorisa">
                    <label for="sorisa">Sorisa borta</label>
                    
                    <input type="checkbox" name="" id="moric">
                    <label for="moric">Moric borta</label>
                </fieldset>
                <fieldset>
                    <legend>Extra Info</legend>
                    <textarea cols="50" rows="5" name="" id=""></textarea>
                </fieldset>
                <input type="submit" value="Submit">
                <input type="reset" value="reset">
            </form>
        </section>
    </header>
</body>
</html>
